[package]
name = "lsimons-$project-rs"
version = "0.1.0"
description = "$shortDescription (Rust)"
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license-file.workspace = true
readme.workspace = true

[lib]
name = "lsimons_$project"
path = "src/lib.rs"

[[bin]]
name = "lsimons-$project-rs"
path = "src/main.rs"

[dependencies]
clap = { version = "4.6", features = ["derive"] }

[dev-dependencies]
assert_cmd = "2"
predicates = "3"

[lints]
workspace = true
